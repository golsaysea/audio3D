<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>立体声空间生成器 Web 终极版</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        body { font-family: 'Microsoft YaHei', sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; padding: 40px 0;}
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 600px; }
        h2 { margin-top: 0; color: #333; text-align: center; font-size: 24px;}
        .section { margin-bottom: 20px; padding: 15px; border: 1px solid #e0e0e0; border-radius: 8px; background: #fafafa;}
        .section-title { font-weight: bold; margin-bottom: 12px; color: #333; border-bottom: 2px solid #2196F3; display: inline-block; padding-bottom: 4px;}
        
        .btn-group { display: flex; gap: 10px; margin-bottom: 10px; }
        .btn { flex: 1; padding: 10px; color: white; border: none; border-radius: 6px; font-size: 14px; cursor: pointer; transition: 0.3s; font-weight: bold; text-align: center;}
        .btn-blue { background: #2196F3; } .btn-blue:hover { background: #1976D2; }
        .btn-orange { background: #FF9800; } .btn-orange:hover { background: #F57C00; }
        .btn-green { background: #4CAF50; } .btn-green:hover { background: #45a049; }
        .btn-purple { background: #9C27B0; } .btn-purple:hover { background: #7B1FA2; }
        .btn:disabled { background: #ccc; cursor: not-allowed; }

        .slider-row { display: flex; align-items: center; margin-bottom: 15px; }
        .slider-row:last-child { margin-bottom: 0; }
        label { width: 170px; font-size: 13px; color: #555; font-weight: bold;}
        input[type="range"] { flex-grow: 1; margin: 0 10px; }
        .value-display { width: 40px; text-align: right; font-size: 14px; font-weight: bold; color: #2196F3; }
        
        select { width: 100%; padding: 8px; border-radius: 4px; border: 1px solid #ccc; margin-bottom: 10px;}
        .status-box { padding: 10px; background: #e3f2fd; border-radius: 6px; font-size: 13px; color: #1565c0; text-align: center; font-weight: bold; margin-top: 15px;}
        .highlight { color: #E91E63; }
    </style>
</head>
<body>

<div class="container">
    <h2>🎧 立体声生成器 完美版</h2>
    
    <div class="section">
        <div class="section-title">1. 加载音频</div>
        <div class="btn-group">
            <button class="btn btn-blue" onclick="document.getElementById('fileUpload').click()">📄 选择文件 (可多选)</button>
            <button class="btn btn-orange" onclick="document.getElementById('dirUpload').click()">📁 选择整个文件夹</button>
        </div>
        <input type="file" id="fileUpload" multiple accept="audio/*" style="display: none;">
        <input type="file" id="dirUpload" webkitdirectory multiple accept="audio/*" style="display: none;">
        <div id="fileStatus" style="font-size: 12px; color: #666; text-align: center;">未加载任何文件</div>
    </div>

    <div class="section">
        <div class="section-title">2. 实时试听 & 调音</div>
        <select id="previewSelect" disabled><option value="">请先加载音频...</option></select>
        <button id="playBtn" class="btn btn-green" style="width: 100%; margin-bottom: 15px;" disabled>▶️ 播放当前选中试听</button>

        <div class="slider-row">
            <label class="highlight">✨ 立体声宽度 (1.0最宽):</label>
            <input type="range" id="width" min="0" max="1" step="0.05" value="1.0">
            <span class="value-display" id="width-val">1.0</span>
        </div>
        <div class="slider-row">
            <label>高通滤波 (低音切除):</label>
            <input type="range" id="cutoff" min="20" max="1000" step="1" value="150">
            <span class="value-display" id="cutoff-val">150</span>
        </div>
        <div class="slider-row">
            <label>合唱强度 (空间感):</label>
            <input type="range" id="chorus" min="0" max="1" step="0.05" value="0.3">
            <span class="value-display" id="chorus-val">0.3</span>
        </div>
        <div class="slider-row">
            <label>混响房间大小:</label>
            <input type="range" id="room" min="0" max="1" step="0.05" value="0.85">
            <span class="value-display" id="room-val">0.85</span>
        </div>
        <div class="slider-row">
            <label>混响湿声 (Wet):</label>
            <input type="range" id="wet" min="0" max="1" step="0.05" value="0.15">
            <span class="value-display" id="wet-val">0.15</span>
        </div>
    </div>

    <div class="section">
        <div class="section-title">3. 渲染导出</div>
        <button id="outDirBtn" class="btn btn-purple" style="width: 100%; margin-bottom: 10px;" disabled>📂 (可选) 指定保存文件夹</button>
        <div id="outStatus" style="font-size: 12px; color: #666; text-align: center; margin-bottom: 10px; line-height: 1.5;">如果未指定或浏览器不支持，<br>将自动打包为 ZIP 下载！</div>
        
        <button id="processBtn" class="btn btn-blue" style="width: 100%; height: 45px; font-size: 16px;" disabled>🚀 一键批量处理并导出</button>
    </div>

    <div id="logBox" class="status-box">等待操作...</div>
</div>

<script>
    let inputFiles = [];
    let outputDirHandle = null;
    let isPlaying = false;

    // 实时预览音频链
    const liveFilter = new Tone.Filter({ type: "highpass", frequency: 150 });
    const liveChorus = new Tone.Chorus({ rate: 0.5, delayTime: 8, depth: 0.15, feedback: 0, wet: 0.3 }).start();
    const liveReverb = new Tone.Freeverb({ roomSize: 0.85, dampening: 3000, wet: 0.15 });
    const liveWidener = new Tone.StereoWidener(1.0);
    const livePlayer = new Tone.Player().chain(liveFilter, liveChorus, liveReverb, liveWidener, Tone.Destination);

    const fileUpload = document.getElementById('fileUpload');
    const dirUpload = document.getElementById('dirUpload');
    const previewSelect = document.getElementById('previewSelect');
    const playBtn = document.getElementById('playBtn');
    const outDirBtn = document.getElementById('outDirBtn');
    const processBtn = document.getElementById('processBtn');
    const logBox = document.getElementById('logBox');

    const params = { width: 1.0, cutoff: 150, chorus: 0.3, room: 0.85, wet: 0.15 };
    
    const bindSlider = (id, paramKey) => {
        const slider = document.getElementById(id);
        const display = document.getElementById(`${id}-val`);
        slider.addEventListener('input', (e) => {
            const val = parseFloat(e.target.value);
            params[paramKey] = val;
            display.innerText = val;
            if (paramKey === 'cutoff') liveFilter.frequency.value = val;
            if (paramKey === 'chorus') liveChorus.wet.value = val;
            if (paramKey === 'room') liveReverb.roomSize.value = val;
            if (paramKey === 'wet') liveReverb.wet.value = val;
            if (paramKey === 'width') liveWidener.width.value = val;
        });
    };
    bindSlider('width', 'width'); bindSlider('cutoff', 'cutoff'); 
    bindSlider('chorus', 'chorus'); bindSlider('room', 'room'); bindSlider('wet', 'wet');

    const handleFiles = (files) => {
        inputFiles = Array.from(files).filter(f => f.type.startsWith('audio/') || f.name.match(/\.(wav|mp3|flac|m4a)$/i));
        if (inputFiles.length > 0) {
            document.getElementById('fileStatus').innerText = `✅ 已加载 ${inputFiles.length} 个音频文件`;
            previewSelect.innerHTML = "";
            inputFiles.forEach((file, index) => {
                const option = document.createElement('option');
                option.value = index;
                option.text = file.name;
                previewSelect.appendChild(option);
            });
            previewSelect.disabled = false; playBtn.disabled = false;
            outDirBtn.disabled = false; processBtn.disabled = false;
            loadPreviewTrack(0);
        } else {
            alert("未找到支持的音频文件！");
        }
    };

    fileUpload.addEventListener('change', (e) => handleFiles(e.target.files));
    dirUpload.addEventListener('change', (e) => handleFiles(e.target.files));

    async function loadPreviewTrack(index) {
        if (livePlayer.state === "started") { livePlayer.stop(); isPlaying = false; }
        playBtn.innerText = "⏳ 加载试听中..."; playBtn.disabled = true;
        const file = inputFiles[index];
        const url = URL.createObjectURL(file);
        await livePlayer.load(url);
        playBtn.disabled = false; playBtn.innerText = "▶️ 播放 / 暂停";
    }

    previewSelect.addEventListener('change', (e) => loadPreviewTrack(e.target.value));

    playBtn.addEventListener('click', async () => {
        await Tone.start();
        if (isPlaying) { livePlayer.stop(); playBtn.innerText = "▶️ 播放 / 暂停"; } 
        else { livePlayer.start(); playBtn.innerText = "⏸️ 暂停"; }
        isPlaying = !isPlaying;
    });

    // 目录选择与安全拦截提示
    outDirBtn.addEventListener('click', async () => {
        if (!window.showDirectoryPicker) {
            alert("❌ 您的当前环境不支持直接选择文件夹！\n\n原因：您可能是在本地双击打开了 HTML 文件 (file:///开头)。\n\n解决办法：请将网页部署到 Cloudflare，在真实的 HTTPS 网址下即可完美使用！否则程序会自动打包成 ZIP 下载。");
            return;
        }
        try {
            outputDirHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
            document.getElementById('outStatus').innerText = `✅ 授权成功！导出时将静默保存至: ${outputDirHandle.name}`;
            document.getElementById('outStatus').style.color = "#4CAF50";
        } catch (err) {
            console.warn("用户取消或授权失败", err);
            alert("⚠️ 文件夹授权失败！\n如果继续，程序将自动把处理好的文件打包成 ZIP 下载。");
        }
    });

    // 核心离线渲染与导出
    processBtn.addEventListener('click', async () => {
        if (livePlayer.state === "started") { livePlayer.stop(); isPlaying = false; playBtn.innerText = "▶️ 播放 / 暂停"; }
        processBtn.disabled = true;
        await Tone.start(); 
        
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        const zip = new JSZip();
        const useZip = !outputDirHandle; 

        for (let i = 0; i < inputFiles.length; i++) {
            const file = inputFiles[i];
            logBox.innerText = `⏳ 正在渲染 (${i+1}/${inputFiles.length}): ${file.name}`;
            await new Promise(resolve => setTimeout(resolve, 150)); 
            
            try {
                const arrayBuffer = await file.arrayBuffer();
                const nativeAudioBuffer = await audioContext.decodeAudioData(arrayBuffer);
                const renderDuration = nativeAudioBuffer.duration + 2.5; // 混响尾音保护
                
                const toneAudioBuffer = new Tone.ToneAudioBuffer(nativeAudioBuffer);

                const renderedBuffer = await Tone.Offline(({ transport }) => {
                    const offPlayer = new Tone.Player(toneAudioBuffer.get());
                    const offFilter = new Tone.Filter({ type: "highpass", frequency: params.cutoff });
                    const offChorus = new Tone.Chorus({ rate: 0.5, delayTime: 8, depth: 0.15, feedback: 0, wet: params.chorus }).start(0);
                    const offReverb = new Tone.Freeverb({ roomSize: params.room, dampening: 3000, wet: params.wet });
                    const offWidener = new Tone.StereoWidener(params.width);
                    
                    // 完美节点串联
                    offPlayer.chain(offFilter, offChorus, offReverb, offWidener, Tone.Destination);
                    offPlayer.start(0);
                    transport.start(0); // 启动引擎
                }, renderDuration, 2, nativeAudioBuffer.sampleRate); 

                const wavBlob = bufferToWave(renderedBuffer.get(), renderedBuffer.length);
                const newName = `Stereo_${file.name.replace(/\.[^/.]+$/, "")}.wav`;

                if (outputDirHandle) {
                    try {
                        const fileHandle = await outputDirHandle.getFileHandle(newName, { create: true });
                        const writable = await fileHandle.createWritable();
                        await writable.write(wavBlob);
                        await writable.close();
                    } catch (e) { 
                        console.warn("写入文件夹失败，加入 ZIP 队列", e); 
                        zip.file(newName, wavBlob);
                    }
                } else {
                    zip.file(newName, wavBlob);
                }
            } catch (err) { console.error(`处理出错:`, err); }
        }

        // 打包下载 ZIP
        if (useZip || Object.keys(zip.files).length > 0) {
            logBox.innerText = "📦 渲染完毕！正在为您打包成 ZIP 文件...";
            try {
                const zipContent = await zip.generateAsync({ type: "blob" });
                const url = URL.createObjectURL(zipContent);
                const a = document.createElement('a');
                a.style.display = 'none';
                a.href = url;
                a.download = "Stereo_Processed_Audio.zip";
                document.body.appendChild(a);
                a.click();
                setTimeout(() => {
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                }, 2000);
            } catch (e) { console.error("ZIP 打包失败", e); }
        }

        logBox.innerText = "🎉 处理完成！请检查您的本地文件夹或下载目录。";
        processBtn.disabled = false;
    });

    // WAV 打包算法 (修复了 Length 头)
    function bufferToWave(abuffer, len) {
        let numOfChan = abuffer.numberOfChannels, length = len * numOfChan * 2 + 44;
        let buffer = new ArrayBuffer(length), view = new DataView(buffer), channels = [], i, sample, offset = 0, pos = 0;
        const setUint16 = (data) => { view.setUint16(offset, data, true); offset += 2; };
        const setUint32 = (data) => { view.setUint32(offset, data, true); offset += 4; };

        setUint32(0x46464952); setUint32(length - 8); setUint32(0x45564157); setUint32(0x20746d66);
        setUint32(16); setUint16(1); setUint16(numOfChan); setUint32(abuffer.sampleRate);
        setUint32(abuffer.sampleRate * 2 * numOfChan); setUint16(numOfChan * 2); setUint16(16);
        setUint32(0x61746164); setUint32(length - 44);

        for (i = 0; i < numOfChan; i++) channels.push(abuffer.getChannelData(i));
        while (pos < len) {
            for (i = 0; i < numOfChan; i++) {
                sample = Math.max(-1, Math.min(1, channels[i][pos]));
                sample = (0.5 + sample < 0 ? sample * 32768 : sample * 32767) | 0;
                view.setInt16(offset, sample, true); offset += 2;
            }
            pos++;
        }
        return new Blob([buffer], { type: "audio/wav" });
    }
</script>
</body>
</html>
