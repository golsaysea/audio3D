<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音频空间生成器 - 护眼记忆版</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        /* 禅意护眼暗色主题 (低对比度，柔和色调) */
        body { font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif; background-color: #1e211f; display: flex; justify-content: center; padding-top: 30px; padding-bottom: 50px; color: #a9b5ac; }
        .container { background: #262a27; padding: 25px 35px; border-radius: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.4); width: 600px; border: 1px solid #363b37; }
        h2 { margin-top: 0; color: #d0d8d1; text-align: center; font-weight: 500; font-size: 20px; border-bottom: 1px solid #363b37; padding-bottom: 15px;}
        
        /* 文件上传区 */
        .upload-buttons { display: flex; gap: 10px; margin-top: 10px; margin-bottom: 20px;}
        .upload-label { flex: 1; text-align: center; background: #2f3430; color: #9da89f; border: 1px dashed #4a524c; padding: 12px; border-radius: 6px; cursor: pointer; transition: 0.2s; font-size: 13px; }
        .upload-label:hover { background: #383e39; color: #c4cdc5; border-color: #6a9955;}
        
        /* 队列区域 */
        .queue-container { max-height: 200px; overflow-y: auto; border: 1px solid #363b37; border-radius: 6px; margin-bottom: 20px; display: none; background: #1c1e1d; }
        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 12px; }
        th, td { padding: 8px 12px; border-bottom: 1px solid #2f3430; }
        th { background: #262a27; position: sticky; top: 0; z-index: 1; color: #879189; font-weight: normal;}
        .file-name { max-width: 200px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #c4cdc5; }
        .status-wait { color: #879189; }
        .status-processing { color: #4fc1ff; }
        .status-done { color: #6a9955; }
        .status-error { color: #f48771; }
        
        /* 专业控制面板样式 */
        .control-group { padding: 15px 0; border-top: 1px solid #363b37; }
        .panel-title { color: #d0d8d1; font-size: 13px; margin-bottom: 15px; display: flex; align-items: center; }
        .panel-title::before { content: ''; display: inline-block; width: 8px; height: 8px; background: #6a9955; border-radius: 50%; margin-right: 8px; box-shadow: 0 0 6px rgba(106, 153, 85, 0.6); }
        
        .slider-row { display: flex; align-items: center; margin-bottom: 12px; justify-content: space-between;}
        label { width: 150px; font-size: 12px; color: #9da89f; text-align: right; padding-right: 15px; }
        input[type="range"] { 
            flex-grow: 1; 
            -webkit-appearance: none; 
            background: #363b37; 
            height: 4px; 
            border-radius: 2px; 
            outline: none; 
        }
        input[type="range"]::-webkit-slider-thumb { 
            -webkit-appearance: none; 
            width: 14px; height: 14px; 
            background: #8aa682; 
            border-radius: 50%; 
            cursor: pointer; 
            transition: 0.1s;
        }
        input[type="range"]::-webkit-slider-thumb:hover { background: #b5cead; transform: scale(1.1);}
        
        .value-box { 
            width: 55px; 
            background: #181a19; 
            border: 1px solid #363b37; 
            color: #c4cdc5; 
            text-align: center; 
            padding: 4px 0; 
            font-size: 12px; 
            border-radius: 4px; 
            margin-left: 15px;
            font-family: 'Consolas', monospace;
        }

        .unit { font-size: 10px; color: #6d766f; margin-left: 2px;}

        /* 按钮组 (低饱和度护眼色) */
        .btn-group { display: flex; gap: 10px; margin-top: 20px; border-top: 1px solid #363b37; padding-top: 20px;}
        .btn { flex: 1; padding: 10px; color: #e0e5e1; border: none; border-radius: 6px; font-size: 13px; cursor: pointer; transition: 0.2s; text-align: center; font-weight: 500;}
        .btn-play { background: #4b6a43; }
        .btn-play:hover { background: #5a7d51; }
        .btn-batch { background: #3b5a75; }
        .btn-batch:hover { background: #4a6d8c; }
        .btn-zip { background: #624b75; }
        .btn-zip:hover { background: #765a8c; }
        .btn-folder { background: #854949; }
        .btn-folder:hover { background: #a15959; }
        .btn:disabled { background: #2f3430; color: #6d766f; cursor: not-allowed; opacity: 0.8;}
    </style>
</head>
<body>

<div class="container">
    <h2>Fairlight Audio - 护眼记忆版</h2>
    
    <div class="upload-buttons">
        <label class="upload-label">
            📁 选择文件夹导入 (Folder)
            <input type="file" id="folderUpload" webkitdirectory directory multiple style="display:none;">
        </label>
        <label class="upload-label">
            📄 选择多文件导入 (Files)
            <input type="file" id="fileUpload" accept="audio/*" multiple style="display:none;">
        </label>
    </div>

    <div class="queue-container" id="queueContainer">
        <table>
            <thead>
                <tr>
                    <th>文件名 (File Name)</th>
                    <th>状态 (Status)</th>
                </tr>
            </thead>
            <tbody id="queueBody"></tbody>
        </table>
    </div>

    <div class="control-group">
        <div class="panel-title">混响与空间重构链路 (Reverb Chain)</div>
        
        <div class="slider-row">
            <label>预延迟 (Pre-delay)</label>
            <input type="range" id="preDelay" min="0" max="200" step="1" value="42">
            <div class="value-box"><span id="preDelay-val">42</span><span class="unit">ms</span></div>
        </div>
        
        <div class="slider-row">
            <label>混响尺寸 (Room Size)</label>
            <input type="range" id="room" min="0" max="0.99" step="0.01" value="0.40">
            <div class="value-box"><span id="room-val">0.40</span><span class="unit"></span></div>
        </div>

        <div class="slider-row">
            <label>早期反射低切 (Low Cut)</label>
            <input type="range" id="lowCut" min="20" max="1000" step="10" value="300">
            <div class="value-box"><span id="lowCut-val">300</span><span class="unit">Hz</span></div>
        </div>

        <div class="slider-row">
            <label>早期反射高切 (High Cut)</label>
            <input type="range" id="highCut" min="5000" max="20000" step="100" value="10000">
            <div class="value-box"><span id="highCut-val">10000</span><span class="unit">Hz</span></div>
        </div>

        <div class="slider-row" style="margin-top: 25px;">
            <label>干/湿比例 (Dry/Wet)</label>
            <input type="range" id="wet" min="0" max="1" step="0.01" value="0.40">
            <div class="value-box"><span id="wet-val">0.40</span><span class="unit"></span></div>
        </div>
    </div>

    <div class="btn-group">
        <button id="playBtn" class="btn btn-play" disabled>▶ 试听 (Play)</button>
        <button id="batchExportBtn" class="btn btn-batch" disabled>🚀 批量渲染 (Render)</button>
        <button id="zipBtn" class="btn btn-zip" disabled>📦 打包 (ZIP)</button>
        <button id="folderSaveBtn" class="btn btn-folder" disabled>📂 输出到目录 (Dir)</button>
    </div>
</div>

<script>
    // --- 本地参数记忆核心逻辑 ---
    // 1. 定义出厂默认值 (含你要求的 Room 0.4)
    const defaultParams = {
        preDelay: 42,
        room: 0.40,
        lowCut: 300,
        highCut: 10000,
        wet: 0.40
    };

    // 2. 读取浏览器缓存，如果没有缓存则使用默认值
    const savedParams = JSON.parse(localStorage.getItem('myFairlightSettings')) || defaultParams;

    // --- 构建“达芬奇”效果器链路 (直接使用缓存值初始化) ---
    const preDelayNode = new Tone.Delay(savedParams.preDelay / 1000); 
    const reverbNode = new Tone.Freeverb({ roomSize: savedParams.room, dampening: 8000 });
    const lowCutFilter = new Tone.Filter({ type: "highpass", frequency: savedParams.lowCut });
    const highCutFilter = new Tone.Filter({ type: "lowpass", frequency: savedParams.highCut });
    const crossFade = new Tone.CrossFade(savedParams.wet); 

    // 湿声路径连接
    preDelayNode.chain(lowCutFilter, highCutFilter, reverbNode, crossFade.b);
    crossFade.toDestination();

    // 3. 将缓存值反向同步给网页 UI 滑块和文字
    function applySavedParamsToUI() {
        document.getElementById('preDelay').value = savedParams.preDelay;
        document.getElementById('preDelay-val').innerText = savedParams.preDelay;
        
        document.getElementById('room').value = savedParams.room;
        document.getElementById('room-val').innerText = savedParams.room.toFixed(2);
        
        document.getElementById('lowCut').value = savedParams.lowCut;
        document.getElementById('lowCut-val').innerText = savedParams.lowCut;
        
        document.getElementById('highCut').value = savedParams.highCut;
        document.getElementById('highCut-val').innerText = savedParams.highCut;
        
        document.getElementById('wet').value = savedParams.wet;
        document.getElementById('wet-val').innerText = savedParams.wet.toFixed(2);
    }
    applySavedParamsToUI(); // 页面一加载就执行

    // 4. 保存当前参数到缓存的函数
    function saveCurrentParams() {
        const currentParams = {
            preDelay: parseFloat(document.getElementById('preDelay').value),
            room: parseFloat(document.getElementById('room').value),
            lowCut: parseFloat(document.getElementById('lowCut').value),
            highCut: parseFloat(document.getElementById('highCut').value),
            wet: parseFloat(document.getElementById('wet').value)
        };
        localStorage.setItem('myFairlightSettings', JSON.stringify(currentParams));
    }

    let player = null;
    let isPlaying = false;
    let fileQueue = []; 
    
    const queueBody = document.getElementById('queueBody');
    const queueContainer = document.getElementById('queueContainer');
    const playBtn = document.getElementById('playBtn');
    const batchExportBtn = document.getElementById('batchExportBtn');
    const zipBtn = document.getElementById('zipBtn');
    const folderSaveBtn = document.getElementById('folderSaveBtn');

    if (!('showDirectoryPicker' in window)) {
        folderSaveBtn.title = "浏览器不支持直接写入文件夹";
    }

    const handleFiles = async (files) => {
        const audioFiles = Array.from(files).filter(f => f.type.startsWith('audio/') || f.name.match(/\.(wav|mp3|m4a|ogg|flac|aac)$/i));
        if (audioFiles.length === 0) return alert("未检测到有效的音频文件！");

        fileQueue = audioFiles.map(f => ({
            file: f, name: f.name.replace(/\.[^/.]+$/, ""), status: 'wait', url: null, blob: null
        }));

        renderQueueTable();
        queueContainer.style.display = 'block';
        batchExportBtn.disabled = false;
        zipBtn.disabled = true; 
        folderSaveBtn.disabled = true;

        if (player) { player.stop(); player.dispose(); }
        const previewUrl = URL.createObjectURL(fileQueue[0].file);
        
        player = new Tone.Player(previewUrl);
        player.connect(crossFade.a);
        player.connect(preDelayNode);
        
        playBtn.innerText = "⏳ 加载中...";
        await Tone.loaded();
        playBtn.disabled = false;
        playBtn.innerText = "▶ 试听首个 (Play)";
    };

    document.getElementById('folderUpload').addEventListener('change', (e) => handleFiles(e.target.files));
    document.getElementById('fileUpload').addEventListener('change', (e) => handleFiles(e.target.files));

    function renderQueueTable() {
        queueBody.innerHTML = fileQueue.map((item, index) => `
            <tr>
                <td class="file-name" title="${item.file.name}">${item.file.name}</td>
                <td id="status-${index}" class="status-${item.status}">${getStatusText(item.status)}</td>
            </tr>
        `).join('');
    }

    function getStatusText(status) {
        switch(status) {
            case 'wait': return 'Wait';
            case 'processing': return 'Processing...';
            case 'done': return 'Done';
            case 'error': return 'Error';
            default: return '';
        }
    }

    function updateQueueItemUI(index) {
        const item = fileQueue[index];
        const statusTd = document.getElementById(`status-${index}`);
        statusTd.className = `status-${item.status}`;
        statusTd.innerText = getStatusText(item.status);
    }

    playBtn.addEventListener('click', async () => {
        await Tone.start();
        if (isPlaying) { player.stop(); playBtn.innerText = "▶ 试听 (Play)"; } 
        else { player.start(); playBtn.innerText = "⏸ 暂停 (Pause)"; }
        isPlaying = !isPlaying;
    });

    const bindSlider = (id, callback) => {
        const slider = document.getElementById(id);
        const display = document.getElementById(`${id}-val`);
        slider.addEventListener('input', (e) => {
            let val = parseFloat(e.target.value);
            if(id === 'room' || id === 'wet') display.innerText = val.toFixed(2);
            else display.innerText = val;
            
            callback(val);
            saveCurrentParams(); // 每次拖动滑块，自动存入浏览器缓存
        });
    };

    bindSlider('preDelay', (val) => { preDelayNode.delayTime.value = val / 1000; }); 
    bindSlider('room', (val) => { reverbNode.roomSize.value = val; });
    bindSlider('lowCut', (val) => { lowCutFilter.frequency.value = val; });
    bindSlider('highCut', (val) => { highCutFilter.frequency.value = val; });
    bindSlider('wet', (val) => { crossFade.fade.value = val; });

    batchExportBtn.addEventListener('click', async () => {
        if (fileQueue.length === 0) return;
        
        batchExportBtn.disabled = true;
        batchExportBtn.innerText = "⏳ Rendering...";
        playBtn.disabled = true; 
        zipBtn.disabled = true; 
        folderSaveBtn.disabled = true;
        
        const decodeCtx = new (window.AudioContext || window.webkitAudioContext)();

        for (let i = 0; i < fileQueue.length; i++) {
            let item = fileQueue[i];
            if (item.status === 'done') continue; 

            item.status = 'processing';
            updateQueueItemUI(i);

            try {
                const arrayBuffer = await item.file.arrayBuffer();
                const audioBuffer = await decodeCtx.decodeAudioData(arrayBuffer);
                
                const currentPreDelay = preDelayNode.delayTime.value;
                const currentRoom = reverbNode.roomSize.value;
                const currentLowCut = lowCutFilter.frequency.value;
                const currentHighCut = highCutFilter.frequency.value;
                const currentWet = crossFade.fade.value;

                const renderedBuffer = await Tone.Offline(() => {
                    const offPlayer = new Tone.Player(audioBuffer);
                    
                    const offPreDelay = new Tone.Delay(currentPreDelay);
                    const offReverb = new Tone.Freeverb({ roomSize: currentRoom, dampening: 8000 });
                    const offLowCut = new Tone.Filter({ type: "highpass", frequency: currentLowCut });
                    const offHighCut = new Tone.Filter({ type: "lowpass", frequency: currentHighCut });
                    const offCrossFade = new Tone.CrossFade(currentWet);

                    offPreDelay.chain(offLowCut, offHighCut, offReverb, offCrossFade.b);
                    offPlayer.connect(offCrossFade.a);
                    offPlayer.connect(offPreDelay);
                    
                    offCrossFade.toDestination(); 
                    
                    offPlayer.start(0);
                }, audioBuffer.duration + 3.0); 

                const wavBlob = bufferToWave(renderedBuffer.get(), renderedBuffer.length);
                item.blob = wavBlob;
                item.url = URL.createObjectURL(wavBlob);
                item.status = 'done';

            } catch (error) {
                console.error(`文件 ${item.name} 处理失败:`, error);
                item.status = 'error';
            }
            updateQueueItemUI(i);
        }

        batchExportBtn.innerText = "✅ Render Complete";
        playBtn.disabled = false;
        
        const hasDoneFiles = fileQueue.some(item => item.status === 'done');
        if (hasDoneFiles) {
            zipBtn.disabled = false;
            if ('showDirectoryPicker' in window) folderSaveBtn.disabled = false;
        }
        
        setTimeout(() => {
            batchExportBtn.innerText = "🚀 批量渲染 (Render)";
            batchExportBtn.disabled = false;
        }, 3000);
    });

    zipBtn.addEventListener('click', async () => {
        zipBtn.disabled = true;
        const originalText = zipBtn.innerText;
        zipBtn.innerText = "⏳ Zipping...";
        try {
            const zip = new JSZip();
            let count = 0;
            fileQueue.forEach(item => {
                if (item.status === 'done' && item.blob) {
                    zip.file(`Cathedral_${item.name}.wav`, item.blob);
                    count++;
                }
            });
            const content = await zip.generateAsync({ type: "blob" });
            const url = URL.createObjectURL(content);
            const anchor = document.createElement('a');
            anchor.download = `Fairlight_Batch_Output.zip`;
            anchor.href = url;
            anchor.click();
            URL.revokeObjectURL(url);
        } catch (error) {
            alert("打包出错！");
        } finally {
            zipBtn.innerText = originalText;
            zipBtn.disabled = false;
        }
    });

    folderSaveBtn.addEventListener('click', async () => {
        if (!('showDirectoryPicker' in window)) return;
        try {
            const dirHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
            folderSaveBtn.disabled = true;
            const originalText = folderSaveBtn.innerText;
            folderSaveBtn.innerText = "⏳ Writing...";

            for (const item of fileQueue) {
                if (item.status === 'done' && item.blob) {
                    const fileHandle = await dirHandle.getFileHandle(`Cathedral_${item.name}.wav`, { create: true });
                    const writable = await fileHandle.createWritable();
                    await writable.write(item.blob);
                    await writable.close();
                }
            }
            alert(`🎉 输出完成！`);
            folderSaveBtn.innerText = originalText;
            folderSaveBtn.disabled = false;
        } catch (error) {
            if (error.name !== 'AbortError') alert("保存失败，请检查权限！");
            folderSaveBtn.disabled = false;
        }
    });

    function bufferToWave(abuffer, len) {
        let numOfChan = abuffer.numberOfChannels, length = len * numOfChan * 2 + 44;
        let buffer = new ArrayBuffer(length), view = new DataView(buffer), channels = [], i, sample, offset = 0, pos = 0;
        const setUint16 = (data) => { view.setUint16(offset, data, true); offset += 2; };
        const setUint32 = (data) => { view.setUint32(offset, data, true); offset += 4; };
        setUint32(0x46464952); setUint32(length - 8); setUint32(0x45564157); setUint32(0x20746d66);
        setUint32(16); setUint16(1); setUint16(numOfChan); setUint32(abuffer.sampleRate);
        setUint32(abuffer.sampleRate * 2 * numOfChan); setUint16(numOfChan * 2); setUint16(16);
        setUint32(0x61746164); setUint32(length - pos - 4);
        for (i = 0; i < numOfChan; i++) channels.push(abuffer.getChannelData(i));
        while (pos < len) {
            for (i = 0; i < numOfChan; i++) {
                sample = Math.max(-1, Math.min(1, channels[i][pos]));
                sample = (0.5 + sample < 0 ? sample * 32768 : sample * 32767) | 0;
                view.setInt16(offset, sample, true);
                offset += 2;
            }
            pos++;
        }
        return new Blob([buffer], { type: "audio/wav" });
    }
</script>
</body>
</html>
